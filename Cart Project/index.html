<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Cart Project</title>

<body>
 <div class="container">

    </div>

        <input type="search" placeholder="Search">

    <div id="icons">

    <div id="productContainer">
        <div class="product">
            <div class="imgContainer">
                 <img src="" alt="">

             <div class="subContainer">

                           <p>name</p>

            <p>Price</p>
                </div>
            <div class="iconContainer">
                 <i class="ri-add-fill"></i>

           </div>
        </div>
    </div>
 </div>
